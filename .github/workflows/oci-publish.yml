name: Publish OCI Chart to GHCR

# Publica el chart como artefacto OCI en GHCR (además del repo gh-pages de
# release.yml). Usa el GITHUB_TOKEN de Actions (packages: write) — no requiere
# un PAT personal. La visibilidad del package se setea una sola vez en GHCR
# (public) para permitir `helm install` anónimo.
on:
  push:
    branches: [main]
    paths: ['charts/**']
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless (Fulcio/Rekor)
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Login to GHCR (helm)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      # cosign lee el docker config (~/.docker/config.json), que `helm registry login`
      # NO popula → firmaba con UNAUTHORIZED (fallo 17/07). docker/login-action lo llena.
      - name: Login to GHCR (docker — para cosign)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Package, push & sign chart (OCI)
        run: |
          cd charts/leloir
          helm dependency build
          helm package .
          CHART_TGZ=$(ls leloir-*.tgz | head -1)
          echo "Pushing $CHART_TGZ → oci://ghcr.io/${{ github.repository_owner }}"
          OUT=$(helm push "$CHART_TGZ" "oci://ghcr.io/${{ github.repository_owner }}" 2>&1)
          echo "$OUT"
          REF=$(echo "$OUT" | sed -n 's/^Pushed: \(.*\)/\1/p')
          DIGEST=$(echo "$OUT" | sed -n 's/^Digest: \(.*\)/\1/p')
          # Firma keyless del chart publicado. Verificable por cualquier usuario:
          #   cosign verify ghcr.io/villadalmine/leloir@<digest> \
          #     --certificate-identity-regexp 'github.com/villadalmine/leloir-helm' \
          #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
          cosign sign --yes "${REF%%:*}@${DIGEST}"
