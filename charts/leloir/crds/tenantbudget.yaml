apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tenantbudgets.leloir.dev
  annotations:
    leloir.dev/sdk-version: "1.0.0"
    leloir.dev/since-milestone: "M3"
spec:
  group: leloir.dev
  names:
    kind: TenantBudget
    listKind: TenantBudgetList
    plural: tenantbudgets
    singular: tenantbudget
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Monthly-USD
          type: number
          jsonPath: .spec.monthly.maxUSD
        - name: Used-USD
          type: number
          jsonPath: .status.currentPeriod.usedUSD
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              properties:

                monthly:
                  type: object
                  description: Monthly rolling budget limits.
                  properties:
                    maxUSD:
                      type: number
                      description: Maximum USD spend per calendar month.
                    maxTokens:
                      type: integer
                      format: int64
                      description: Maximum LLM tokens per calendar month.
                    alertAtPercent:
                      type: number
                      description: Send alert when this % of budget is consumed.
                      default: 80
                      minimum: 1
                      maximum: 99
                    softLimitPercent:
                      type: number
                      description: >
                        At this % of budget, new investigations are queued
                        rather than rejected. Between soft and hard limit.
                      default: 90
                    hardLimitAction:
                      type: string
                      description: What to do when monthly budget is exhausted.
                      enum: [reject, notify-only]
                      default: reject

                perInvestigation:
                  type: object
                  description: Per-investigation limits (floor values; AlertRoute can set lower).
                  properties:
                    maxUSD:
                      type: number
                      description: Max USD per single investigation.
                      default: 5.0
                    maxTokens:
                      type: integer
                      format: int64
                      description: Max tokens per single investigation.
                      default: 100000
                    maxToolCalls:
                      type: integer
                      description: Max MCP tool calls per investigation.
                      default: 50
                    maxSubInvocations:
                      type: integer
                      description: Max A2A sub-agent invocations per investigation tree.
                      default: 20

                a2a:
                  type: object
                  description: A2A orchestration limits.
                  properties:
                    maxInvocationDepth:
                      type: integer
                      description: >
                        Maximum nesting depth of A2A calls.
                        A=1, A→B=2, A→B→C=3, etc.
                      default: 5
                      minimum: 1
                      maximum: 10
                    maxFanOutPerAgent:
                      type: integer
                      description: >
                        Maximum number of concurrent sub-agent calls one agent
                        can make in a single investigation step.
                      default: 3
                      minimum: 1
                      maximum: 10
                    maxTotalSubInvocations:
                      type: integer
                      description: >
                        Maximum total A2A calls across the entire investigation tree.
                      default: 20
                      minimum: 1
                      maximum: 100

            status:
              type: object
              properties:
                currentPeriod:
                  type: object
                  properties:
                    periodStart:
                      type: string
                      format: date-time
                    usedUSD:
                      type: number
                    usedTokens:
                      type: integer
                      format: int64
                    investigationCount:
                      type: integer
                    percentUsed:
                      type: number
                    status:
                      type: string
                      enum: [ok, warning, soft-limit, hard-limit]
