# Investigation — declarative one-shot investigation (spec-m16, D8).
# The GOVERNED equivalent of the Holmes operator HealthCheck: same
# ergonomics ("I throw a question and see everything"), but runs through Leloir's
# pipeline (authoritative tenant per namespace, budget, HITL, audit).
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: investigations.leloir.dev
  annotations:
    leloir.dev/sdk-version: "1.0.0"
    leloir.dev/since-milestone: "M16"
spec:
  group: leloir.dev
  names:
    kind: Investigation
    listKind: InvestigationList
    plural: investigations
    singular: investigation
    shortNames: [inv]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Outcome
          type: string
          jsonPath: .status.outcome
        - name: Cost-USD
          type: number
          jsonPath: .status.costUSD
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  description: The question to investigate (sanitized like any alert).
                agentName:
                  type: string
                  description: Explicit agent; empty = routes via AlertRoute like an alert.
                budget:
                  type: object
                  description: Per-investigation budget (layer 2 of 4); 0 = route's budget.
                  properties:
                    maxUSD: {type: number}
                    maxTokens: {type: integer, format: int64}
                timeoutMinutes:
                  type: integer
                  description: Deadline; 0 = route's deadline (default 10).
                destinations:
                  type: array
                  items: {type: string}
                  description: >-
                    Refs to NotificationChannel. v1: notifications exit through the
                    tenant's configured channels; per-destination routing = backlog.
            status:
              type: object
              properties:
                investigationID: {type: string}
                phase: {type: string}
                outcome: {type: string}
                reason: {type: string}
                costUSD: {type: number}
                totalTokens: {type: integer, format: int64}
