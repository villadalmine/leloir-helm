{{- if .Values.webhookReceiver.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "leloir.receiver.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "leloir.labels" . | nindent 4 }}
data:
  webhook.yaml: |
    listenAddr: ":8081"
    forwardTo: "http://{{ include "leloir.controlplane.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local"
    maxRequestSize: 1048576
    forwardTimeout: 10s
    dedupWindow: 5m
    forwardMaxRetries: 2
    observability: {metrics: {enabled: true}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "leloir.receiver.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "leloir.labels" . | nindent 4 }}
    app: leloir-webhook-receiver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: leloir-webhook-receiver
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "leloir.labels" . | nindent 8 }}
        app: leloir-webhook-receiver
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: receiver
          image: {{ include "leloir.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/leloir-webhook-receiver"]
          args: ["--config=/etc/leloir/webhook.yaml"]
          ports:
            - {containerPort: 8081, name: http}
          readinessProbe:
            httpGet: {path: /healthz, port: 8081}
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - {name: cfg, mountPath: /etc/leloir, readOnly: true}
      volumes:
        - name: cfg
          configMap:
            name: {{ include "leloir.receiver.fullname" . }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "leloir.receiver.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "leloir.labels" . | nindent 4 }}
    app: leloir-webhook-receiver
spec:
  type: ClusterIP
  selector:
    app: leloir-webhook-receiver
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - {name: http, port: 8081, targetPort: 8081}
{{- end }}
