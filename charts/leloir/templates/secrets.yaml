{{/* Database DSN secret — chart-managed unless an external Secret is provided. */}}
{{- if not (and (not .Values.postgresql.enabled) .Values.externalDatabase.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "leloir.fullname" . }}-db
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "leloir.labels" . | nindent 4 }}
type: Opaque
stringData:
  dsn: >-
    {{- if .Values.postgresql.enabled }}
    postgres://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ include "leloir.postgresHost" . }}:5432/{{ .Values.postgresql.auth.database }}?sslmode=disable
    {{- else }}
    {{ required "Set externalDatabase.dsn (or externalDatabase.existingSecret) when postgresql.enabled=false" .Values.externalDatabase.dsn }}
    {{- end }}
{{- end }}
---
{{/*
Thrash-escalation token (spec-m21 21.6) — shared by the control plane and the
gateway for the POST /internal/anomaly callback. Generated once and reused on
upgrade (lookup) so it stays stable. profile:local only; corporate can inject one.
*/}}
{{- if eq .Values.profile "local" }}
{{- $sec := (lookup "v1" "Secret" .Release.Namespace (printf "%s-thrash-token" (include "leloir.fullname" .))) }}
{{- $tok := "" }}
{{- if $sec }}{{ $tok = index $sec.data "token" | b64dec }}{{ else }}{{ $tok = randAlphaNum 40 }}{{ end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "leloir.fullname" . }}-thrash-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "leloir.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ $tok | quote }}
{{- end }}
{{- if .Values.license.key }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "leloir.fullname" . }}-license
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "leloir.labels" . | nindent 4 }}
type: Opaque
stringData:
  license.key: {{ .Values.license.key | quote }}
{{- end }}
