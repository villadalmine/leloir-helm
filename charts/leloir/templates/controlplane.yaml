apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "leloir.controlplane.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "leloir.labels" . | nindent 4 }}
    app: leloir-controlplane
spec:
  replicas: {{ .Values.controlPlane.replicas }}
  selector:
    matchLabels:
      app: leloir-controlplane
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "leloir.labels" . | nindent 8 }}
        app: leloir-controlplane
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/controlplane-config.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ if .Values.rbac.create }}{{ include "leloir.controlplane.fullname" . }}{{ else }}default{{ end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.hostAliases }}
      # OIDC split-horizon: cuando el issuer (p.ej. Dex) se sirve por un Gateway cuyo
      # VIP externo NO es alcanzable in-cluster (hairpin), mapear el hostname del issuer
      # al ClusterIP del gateway para que el CP valide el issuer. Ver docs/OIDC_SETUP.md.
      hostAliases: {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        # Wait for Postgres before starting → clean startup without CrashLoop due to
        # ordering (the control plane needs the DB at startup). busybox, tiny+public.
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ if .Values.postgresql.enabled }}{{ include "leloir.postgresHost" . }}{{ else }}$(echo "$LELOIR_DATABASE_DSN" | sed -E 's#.*@([^:/]+).*#\1#'){{ end }} 5432; do
                echo "waiting for postgres..."; sleep 2
              done
          {{- if not .Values.postgresql.enabled }}
          env:
            - name: LELOIR_DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "leloir.dsnSecret" . }}
                  key: {{ include "leloir.dsnSecretKey" . }}
          {{- end }}
      containers:
        - name: controlplane
          image: {{ include "leloir.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["--config=/etc/leloir/config.yaml"]
          ports:
            - {containerPort: 8080, name: http}
            {{- if .Values.controlPlane.internalListener.enabled }}
            - {containerPort: {{ .Values.controlPlane.internalListener.port }}, name: internal}
            {{- end }}
            - {containerPort: 9091, name: metrics}
          env:
            - name: LELOIR_DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "leloir.dsnSecret" . }}
                  key: {{ include "leloir.dsnSecretKey" . }}
            {{- if .Values.llm.masterKeySecret }}
            # Master key del litellm upstream — la usan los drivers litellm-operator /
            # envoy-ai-gw para reconciliar teams/virtual-keys. Nunca en el ConfigMap.
            - name: LELOIR_LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.llm.masterKeySecret }}
                  key: {{ .Values.llm.masterKeySecretKey }}
            {{- end }}
            {{- if .Values.anomaly.thrashToken.existingSecret }}
            # Token del listener /internal/anomaly. Bajo GitOps (ArgoCD) el `lookup` de
            # helm no corre → referenciamos un Secret existente en vez de generarlo (así
            # el token es ESTABLE y no cambia en cada sync). Ver values anomaly.thrashToken.
            - name: LELOIR_THRASH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.anomaly.thrashToken.existingSecret }}
                  key: {{ .Values.anomaly.thrashToken.existingSecretKey }}
            {{- else if eq .Values.profile "local" }}
            - name: LELOIR_THRASH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "leloir.fullname" . }}-thrash-token
                  key: token
            {{- end }}
            {{- if .Values.license.key }}
            - name: LELOIR_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "leloir.fullname" . }}-license
                  key: license.key
            {{- else if .Values.license.existingSecret }}
            - name: LELOIR_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.license.existingSecret }}
                  key: {{ .Values.license.existingSecretKey }}
            {{- end }}
            {{- if and .Values.auth.oidc.enabled .Values.auth.oidc.existingSecret }}
            - name: LELOIR_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.oidc.existingSecret }}
                  key: {{ .Values.auth.oidc.existingSecretKey }}
            {{- end }}
            {{- if and .Values.audit.streaming.endpoint .Values.audit.streaming.existingSecret }}
            # SIEM streaming bearer (never in the ConfigMap).
            - name: LELOIR_AUDIT_STREAM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.audit.streaming.existingSecret }}
                  key: {{ .Values.audit.streaming.existingSecretKey }}
            {{- end }}
          # readiness = /healthz (server up + DB): the pod is ready to serve the
          # API/UI (register agents, config). /readyz demands a registered agent
          # ("ready to investigate") — cannot be used as pod-readiness because a
          # fresh install has no agents and the Service wouldn't route (chicken-and-egg).
          readinessProbe:
            httpGet: {path: /healthz, port: 8080}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            initialDelaySeconds: 10
            periodSeconds: 15
          resources: {{- toYaml .Values.controlPlane.resources | nindent 12 }}
          volumeMounts:
            - {name: config, mountPath: /etc/leloir, readOnly: true}
            {{- if .Values.auth.oidc.caSecret }}
            - {name: oidc-ca, mountPath: /etc/leloir-oidc-ca, readOnly: true}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "leloir.controlplane.fullname" . }}
        {{- if .Values.auth.oidc.caSecret }}
        # CA del issuer OIDC (p.ej. cluster-home-ca de cert-manager) → auth.oidc.caFile.
        - name: oidc-ca
          secret:
            secretName: {{ .Values.auth.oidc.caSecret }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "leloir.controlplane.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "leloir.labels" . | nindent 4 }}
    app: leloir-controlplane
spec:
  type: ClusterIP
  selector:
    app: leloir-controlplane
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - {name: http, port: 80, targetPort: 8080}
    - {name: metrics, port: 9091, targetPort: 9091}
{{- if .Values.controlPlane.internalListener.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "leloir.controlplane.fullname" . }}-internal
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "leloir.labels" . | nindent 4 }}
    app: leloir-controlplane
spec:
  type: ClusterIP
  selector:
    app: leloir-controlplane
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - {name: internal, port: {{ .Values.controlPlane.internalListener.port }}, targetPort: {{ .Values.controlPlane.internalListener.port }}}
{{- end }}
