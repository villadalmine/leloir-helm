apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "leloir.controlplane.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "leloir.labels" . | nindent 4 }}
data:
  config.yaml: |
    profile: {{ .Values.profile }}
    api:
      httpAddr: ":8080"
      {{- if .Values.controlPlane.internalListener.enabled }}
      internalAddr: ":{{ .Values.controlPlane.internalListener.port }}"
      {{- end }}
    database:
      driver: postgres
      # DSN injected via LELOIR_DATABASE_DSN (Secret) at runtime.
    auth:
      {{- if .Values.auth.oidc.enabled }}
      mode: oidc
      oidc:
        issuer: {{ .Values.auth.oidc.issuer | quote }}
        clientId: {{ .Values.auth.oidc.clientID | quote }}
        # clientSecret via LELOIR_OIDC_CLIENT_SECRET (Secret).
        {{- with .Values.auth.oidc.redirectURL }}
        redirectURL: {{ . | quote }}
        {{- end }}
        {{- if .Values.auth.oidc.caSecret }}
        # Trust the issuer's private CA (e.g. Dex behind an in-cluster gateway with
        # a homelab CA). Mounted from auth.oidc.caSecret. See docs/OIDC_SETUP.md.
        caFile: /etc/leloir-oidc-ca/{{ .Values.auth.oidc.caKey }}
        {{- end }}
        {{- with .Values.auth.oidc.scopes }}
        scopes: {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.auth.oidc.adminEmails }}
        adminEmails: {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- else }}
      mode: single-user
      singleUser:
        username: {{ .Values.auth.singleUser.username | quote }}
      {{- end }}
    mcpGateway:
      {{- if .Values.gateway.externalEndpoint }}
      # El chart no despliega el gateway (gateway.enabled=false) — apuntamos a uno ya
      # desplegado (p.ej. gestionado por otro pipeline). Ver values gateway.externalEndpoint.
      endpoint: {{ .Values.gateway.externalEndpoint | quote }}
      {{- else if .Values.gateway.enabled }}
      endpoint: "http://{{ include "leloir.gateway.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:8082"
      {{- end }}
    {{- if .Values.llm.enabled }}
    # ─── LLM layer ────────────────────────────────────────────────────────────
    # El broker enruta las llamadas de los agentes a tu endpoint LLM y las gobierna
    # (budget/metering/audit). api-key vía LELOIR_LLM_UPSTREAM_KEY (Secret), nunca acá.
    llmBroker:
      driver: {{ .Values.llm.driver | quote }}
      spendPollInterval: {{ .Values.llm.spendPollInterval | default "30s" }}
      {{- if eq .Values.llm.driver "builtin" }}
      # El endpoint debe ser un proxy OpenAI-compatible que maneje la auth upstream
      # (p.ej. litellm con las keys de tus proveedores). Ver docs/OIDC_SETUP + proposal §m15.
      builtin:
        endpoint: {{ .Values.llm.endpoint | quote }}
      {{- else if eq .Values.llm.driver "litellm-operator" }}
      # Driver operator (PalenaAI): Leloir reconcilia teams/virtual-keys sobre un
      # LiteLLMInstance existente. Ver proposal §m15. Config en llm.litellmOperator.
      litellmOperator:
        {{- toYaml .Values.llm.litellmOperator | nindent 8 }}
      {{- else if eq .Values.llm.driver "envoy-ai-gw" }}
      # Cadena de 2 capas por-tenant: Envoy AI Gateway (keyless, JWT por-tenant) → litellm.
      # La capa LLM real del homelab. Config en llm.litellmOperator + llm.envoyAIGateway.
      litellmOperator:
        {{- toYaml .Values.llm.litellmOperator | nindent 8 }}
      envoyAIGateway:
        {{- toYaml .Values.llm.envoyAIGateway | nindent 8 }}
      {{- end }}
    modelProvider:
      models:
        - id: {{ .Values.llm.model.id | quote }}
          upstream: {{ .Values.llm.model.upstream | quote }}
          pricing: {inputPer1M: {{ .Values.llm.model.pricing.inputPer1M }}, outputPer1M: {{ .Values.llm.model.pricing.outputPer1M }}}
          maxTokensPerCall: {{ .Values.llm.model.maxTokensPerCall }}
      routing: {default: {{ .Values.llm.model.id | quote }}}
    tenantBudgets:
      - tenantID: default
        monthlyMaxUSD: {{ .Values.llm.tenantBudget.monthlyMaxUSD }}
        hardLimitAction: {{ .Values.llm.tenantBudget.hardLimitAction }}
    {{- if .Values.agents.raw }}
    # Passthrough completo (BYO/avanzado): agentes con tools inline, múltiples agentes
    # (p.ej. holmesgpt), toolsets custom. Los agents/routes son inherentemente free-form;
    # este modo expone el schema real del CP. Ver examples/values-oidc.yaml + README.
    agents:
      {{- toYaml .Values.agents.raw | nindent 6 }}
    {{- else if .Values.agents.flagship.enabled }}
    # Agente flagship first-party (canned). TOOLS reales vía MCPServer CRD / el gateway (no acá).
    agents:
      - name: leloir-agent
        type: leloir-agent
        tenantID: default
        harness:
          systemPrompt: |
            You are the Leloir first-party incident responder. Diagnose the alert,
            quote the concrete signal you relied on, and give a concise root cause
            plus a concrete remediation. If you have tools, read logs/events before
            concluding; do not fabricate actions you cannot verify.
          loop: {maxIterations: 6}
          model: {{ .Values.agents.flagship.model | quote }}
          credentials: {from: llmBroker}
    {{- end }}
    {{- if .Values.routes.raw }}
    routes:
      {{- toYaml .Values.routes.raw | nindent 6 }}
    {{- else if .Values.routes.catchAll.enabled }}
    routes:
      - name: catch-all
        tenantID: default
        agentName: {{ .Values.routes.catchAll.agentName | default "leloir-agent" | quote }}
        enabled: true
        priority: 1
        budgetMaxUSD: {{ .Values.routes.catchAll.budgetMaxUSD }}
        {{- with .Values.routes.catchAll.budgetMaxTokens }}
        budgetMaxTokens: {{ . }}
        {{- end }}
        timeoutMinutes: {{ .Values.routes.catchAll.timeoutMinutes | default 10 }}
    {{- end }}
    {{- end }}
    anomaly:
      spendVelocityUSD: {{ .Values.anomaly.spendVelocityUSD }}
      autoReleaseCooldownMinutes: {{ .Values.anomaly.autoReleaseCooldownMinutes }}
      # thrashToken via LELOIR_THRASH_TOKEN (Secret).
    audit:
      hotRetentionDays: {{ .Values.audit.hotRetentionDays }}
      {{- if .Values.audit.streaming.endpoint }}
      # SIEM streaming (FREE feature): every audit event is also POSTed to this
      # sink as a JSON batch. Fail-open — a dead sink never blocks anything.
      # Bearer via LELOIR_AUDIT_STREAM_TOKEN (Secret), never in this ConfigMap.
      streaming:
        endpoint: {{ .Values.audit.streaming.endpoint | quote }}
        {{- with .Values.audit.streaming.headers }}
        headers: {{- toYaml . | nindent 10 }}
        {{- end }}
        batchSize: {{ .Values.audit.streaming.batchSize }}
        flushInterval: {{ .Values.audit.streaming.flushInterval }}
      {{- end }}
    {{- if .Values.containment.enabled }}
    # Modo 2 (black-box containment, spec-m13.4): platform-provisioned agents
    # get scoped RBAC + egress-lock + forced env pointing at these seams.
    containment:
      enabled: true
      # Por defecto apunta al gateway del chart; si el gateway es externo
      # (gateway.enabled=false), seteá containment.gatewayHost/Port al Service real.
      gatewayHost: {{ .Values.containment.gatewayHost | default (printf "%s.%s.svc.cluster.local" (include "leloir.gateway.fullname" .) .Release.Namespace) | quote }}
      gatewayPort: {{ .Values.containment.gatewayPort | default 8082 }}
      llmHost: {{ .Values.containment.llmHost | quote }}
      llmPort: {{ .Values.containment.llmPort }}
      platformNamespaces:
        - {{ .Release.Namespace }}
        {{- range .Values.containment.extraPlatformNamespaces }}
        - {{ . }}
        {{- end }}
    {{- end }}
    {{- if .Values.rag.enabled }}
    rag:
      embeddingModel: {{ .Values.rag.embeddingModel | quote }}
      embeddingDim: {{ .Values.rag.embeddingDim }}
      distanceThreshold: {{ .Values.rag.distanceThreshold }}
      retentionDays: {{ .Values.rag.retentionDays }}
    {{- end }}
    kubernetes:
      enabled: {{ .Values.kubernetes.enabled }}
    observability:
      {{- if .Values.observability.otlp.enabled }}
      otlp:
        enabled: true
        endpoint: {{ .Values.observability.otlp.endpoint | quote }}
      {{- else }}
      otlp: {enabled: false}
      {{- end }}
      metrics: {enabled: {{ .Values.observability.metrics.enabled }}, addr: ":{{ .Values.observability.metrics.port }}"}
      serviceName: leloir-controlplane
      {{- with .Values.observability.environment }}
      environment: {{ . | quote }}
      {{- end }}
