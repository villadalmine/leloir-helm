{{- if .Values.memoryMcp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "leloir.memory.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "leloir.labels" . | nindent 4 }}
    app: leloir-memory-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: leloir-memory-mcp
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "leloir.labels" . | nindent 8 }}
        app: leloir-memory-mcp
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: memory-mcp
          image: {{ include "leloir.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/leloir-memory-mcp"]
          ports:
            - {containerPort: 8090, name: http}
          env:
            - name: LELOIR_DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "leloir.dsnSecret" . }}
                  key: {{ include "leloir.dsnSecretKey" . }}
          readinessProbe:
            httpGet: {path: /healthz, port: 8090}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "leloir.memory.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "leloir.labels" . | nindent 4 }}
    app: leloir-memory-mcp
spec:
  type: ClusterIP
  selector:
    app: leloir-memory-mcp
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - {name: http, port: 8090, targetPort: 8090}
{{- end }}
