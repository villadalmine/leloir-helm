{{- if .Values.observability.dashboards.enabled }}
# Dashboards de Grafana como ConfigMap con el label del sidecar de Grafana (por
# defecto grafana_dashboard=1). OFF por defecto — requiere el sidecar de dashboards
# (kube-prometheus-stack lo trae). Ajustá label/labelValue a tu sidecar.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "leloir.controlplane.fullname" . }}-dashboards
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "leloir.labels" . | nindent 4 }}
    {{ .Values.observability.dashboards.label }}: {{ .Values.observability.dashboards.labelValue | quote }}
data:
  leloir-dashboard.json: |
{{ .Files.Get "files/leloir-dashboard.json" | indent 4 }}
  leloir-fleet-dashboard.json: |
{{ .Files.Get "files/leloir-fleet-dashboard.json" | indent 4 }}
{{- end }}
