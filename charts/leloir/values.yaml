# Leloir — values.yaml
#
# A SINGLE chart. The Leloir engine is 100% FREE and open-source — every
# feature in this chart is enabled or enableable without any license. (A
# commercial integrated dashboard is offered separately by the maintainers as
# a CLIENT of the engine's public API; it does not gate anything here.)

# ─── Profile ──────────────────────────────────────────────────────────────────
# local     → safe-to-test: generates native Secrets (thrash token, static admin),
#             internal Postgres, OIDC OFF. Ideal for Minikube/Kind.
# corporate → secure mode: requires OIDC + external Postgres/Vault injected.
profile: local

# ─── License ──────────────────────────────────────────────────────────────────
# The engine is fully free: no feature in this chart requires a key. This block
# is kept for the OPTIONAL license scorecard (GET /api/v1/license) and for the
# future commercial dashboard's own licensing — leaving it empty is the normal,
# fully-functional install. Injected as LELOIR_LICENSE_KEY env var.
license:
  key: ""
  # Reference an existing Secret instead of placing the key in values (recommended).
  existingSecret: ""
  existingSecretKey: "license.key"

# ─── Images ───────────────────────────────────────────────────────────────────
image:
  repository: ghcr.io/villadalmine/leloir-controlplane
  tag: ""                 # empty = uses .Chart.appVersion
  pullPolicy: IfNotPresent
# Images are private for now — the user injects their imagePullSecrets.
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# The Bitnami subchart blocks non-Bitnami images (we use pgvector/pgvector to
# have the vector extension) → we must explicitly allow it.
global:
  security:
    allowInsecureImages: true

# ─── Database (Postgres + pgvector) ───────────────────────────────────────────
# Bitnami subchart. enabled:true spins up a Postgres 16 with pgvector.
postgresql:
  enabled: true
  image:
    repository: pgvector/pgvector
    tag: pg16
  auth:
    username: leloir
    database: leloir
    # Bundled Postgres password. The default is usable for testing (profile:
    # local); OVERRIDE IT in prod. The chart builds the DSN with this same value.
    password: "leloir-change-me"
  primary:
    persistence:
      enabled: true
      size: 8Gi
    # The pgvector/pgvector image (standard postgres) requires a writable
    # /var/run/postgresql; the Bitnami chart mounts rootFS read-only by default → crash.
    # We disable this for this non-Bitnami image.
    containerSecurityContext:
      readOnlyRootFilesystem: false
# If postgresql.enabled=false, inject a DSN to an external Postgres (e.g. RDS):
externalDatabase:
  dsn: ""                 # postgres://user:pass@host:5432/leloir?sslmode=require
  existingSecret: ""
  existingSecretKey: "dsn"

# ─── Control plane ────────────────────────────────────────────────────────────
controlPlane:
  replicas: 1
  resources:
    requests: {cpu: "100m", memory: "256Mi"}
    limits: {cpu: "1", memory: "1Gi"}
  # Separate internal listener for /internal/* (hardening spec-m21 21.6): it is
  # not exposed via Ingress/HTTPRoute; closed with a CNP to the gateway if Cilium.
  internalListener:
    enabled: true
    port: 8090

# ─── MCP Gateway (the only path to tools) ─────────────────────────────────────
gateway:
  enabled: true
  replicas: 1
  resources:
    requests: {cpu: "50m", memory: "128Mi"}
    limits: {cpu: "500m", memory: "512Mi"}

# ─── Memory-as-an-MCP-Server (spec-m18) ───────────────────────────────────────
memoryMcp:
  enabled: true

# ─── Webhook receiver (Alertmanager/Slack/… → /api/v1/alerts) ─────────────────
webhookReceiver:
  enabled: true

# ─── Governance features (all free, on by default) ────────────────────────────
rag:                        # Episodic RAG (free)
  enabled: true
  embeddingModel: "local"   # local = zero deps; litellm alias = hosted (with key)
  embeddingDim: 256
  distanceThreshold: 0.25
  retentionDays: 90
anomaly:                    # anomaly → quarantine (free)
  spendVelocityUSD: 0.50
  autoReleaseCooldownMinutes: 30

# ─── SIEM audit streaming (free) ──────────────────────────────────────────────
# Forward every audit event (tool calls, approvals, budget, quarantine…) to an
# external HTTP sink — a SIEM or a collector (vector/fluent-bit) in front of
# one. FAIL-OPEN: a dead sink never blocks an investigation; the in-cluster
# Postgres audit stays the source of truth. Bearer auth via the
# LELOIR_AUDIT_STREAM_TOKEN env (set audit.streaming.existingSecret).
audit:
  streaming:
    endpoint: ""            # empty = disabled
    headers: {}             # extra static headers (e.g. X-Scope-OrgID)
    batchSize: 64
    flushInterval: 2s
    existingSecret: ""      # Secret with key "token" → Authorization: Bearer
    existingSecretKey: "token"

# ─── Deployment hardening (chart flags, default OFF — requires Cilium) ────────
# These ARE separate manifests (Cilium CNPs) that would break a cluster without
# Cilium → off by default. Free like everything else; flip them ON when your
# cluster runs Cilium (mtls additionally needs SPIRE mutual-auth enabled).
hardening:
  mtls:
    enabled: false          # SPIFFE mTLS on gateway→control-plane :8090 (requires Cilium mutual-auth/SPIRE)
  networkPolicies:
    enabled: false          # Ingress-lock CNP on the internal listener (requires Cilium)

# ─── Exposure: Standard Ingress (default) or Gateway API HTTPRoute ────────────
ingress:
  enabled: true
  className: ""             # nginx | traefik | ""
  host: leloir.local
  tls: []
  annotations: {}
# Gateway API (homelab). If enabled, use this instead of the Ingress.
gateway_api:
  enabled: false
  parentRefName: ""
  parentRefNamespace: ""
  host: leloir.local

# ─── RBAC ─────────────────────────────────────────────────────────────────────
rbac:
  # cluster-wide watcher for Leloir (watches CRDs/pods in all ns); namespaced
  # Role for litellm. create:false if the operator manages them separately.
  create: true

# ─── Auth ─────────────────────────────────────────────────────────────────────
auth:
  # single-user (local) — a static admin without OIDC. For corporate, use OIDC.
  mode: single-user
  singleUser:
    username: admin
  oidc:
    enabled: false
    issuer: ""
    clientID: ""
    # clientSecret via existingSecret (never in values).
    existingSecret: ""

# Node/scheduling (optional; empty = no restrictions).
nodeSelector: {}
tolerations: []
affinity: {}
