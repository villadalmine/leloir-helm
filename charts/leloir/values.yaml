# Leloir — values.yaml
#
# A SINGLE chart. The Leloir engine is 100% FREE and open-source — every
# feature in this chart is enabled or enableable without any license. (A
# commercial integrated dashboard is offered separately by the maintainers as
# a CLIENT of the engine's public API; it does not gate anything here.)

# ─── Profile ──────────────────────────────────────────────────────────────────
# local     → safe-to-test: generates native Secrets (thrash token, static admin),
#             internal Postgres, OIDC OFF. Ideal for Minikube/Kind.
# corporate → secure mode: requires OIDC + external Postgres/Vault injected.
profile: local

# ─── License ──────────────────────────────────────────────────────────────────
# The engine is fully free: no feature in this chart requires a key. This block
# is kept for the OPTIONAL license scorecard (GET /api/v1/license) and for the
# future commercial dashboard's own licensing — leaving it empty is the normal,
# fully-functional install. Injected as LELOIR_LICENSE_KEY env var.
license:
  key: ""
  # Reference an existing Secret instead of placing the key in values (recommended).
  existingSecret: ""
  existingSecretKey: "license.key"

# ─── Images ───────────────────────────────────────────────────────────────────
image:
  repository: ghcr.io/villadalmine/leloir-controlplane
  # `latest` es el tag publicado (multi-arch amd64+arm64). Para prod PINEÁ un digest
  # o un tag versionado. (Vacío usaría .Chart.appVersion, que hoy no se publica como
  # tag de imagen → daría ImagePullBackOff; cazado 17/07 por scripts/list-images.sh.)
  tag: "latest"
  pullPolicy: IfNotPresent
# The GHCR image is public — imagePullSecrets only needed for private mirrors.
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# The Bitnami subchart blocks non-Bitnami images (we use pgvector/pgvector to
# have the vector extension) → we must explicitly allow it.
global:
  security:
    allowInsecureImages: true

# ─── Database (Postgres + pgvector) ───────────────────────────────────────────
# Bitnami subchart. enabled:true spins up a Postgres 16 with pgvector.
postgresql:
  enabled: true
  image:
    repository: pgvector/pgvector
    tag: pg16
  auth:
    username: leloir
    database: leloir
    # Bundled Postgres password. The default is usable for testing (profile:
    # local); OVERRIDE IT in prod. The chart builds the DSN with this same value.
    password: "leloir-change-me"
  primary:
    persistence:
      enabled: true
      size: 8Gi
    # The pgvector/pgvector image (standard postgres) requires a writable
    # /var/run/postgresql; the Bitnami chart mounts rootFS read-only by default → crash.
    # We disable this for this non-Bitnami image.
    containerSecurityContext:
      readOnlyRootFilesystem: false
# If postgresql.enabled=false, inject a DSN to an external Postgres (e.g. RDS):
externalDatabase:
  dsn: ""                 # postgres://user:pass@host:5432/leloir?sslmode=require
  existingSecret: ""
  existingSecretKey: "dsn"

# ─── Control plane ────────────────────────────────────────────────────────────
controlPlane:
  replicas: 1
  resources:
    requests: {cpu: "100m", memory: "256Mi"}
    limits: {cpu: "1", memory: "1Gi"}
  # Separate internal listener for /internal/* (hardening spec-m21 21.6): it is
  # not exposed via Ingress/HTTPRoute; closed with a CNP to the gateway if Cilium.
  internalListener:
    enabled: true
    port: 8090

# ─── MCP Gateway (the only path to tools) ─────────────────────────────────────
gateway:
  enabled: true
  # Si el gateway ya lo despliega otro pipeline (p.ej. Ansible en el homelab), poné
  # enabled:false y seteá externalEndpoint al Service existente. El CP apunta ahí.
  externalEndpoint: ""        # e.g. http://leloir-mcp-gateway.leloir.svc.cluster.local:8082
  replicas: 1
  resources:
    requests: {cpu: "50m", memory: "128Mi"}
    limits: {cpu: "500m", memory: "512Mi"}

# ─── Memory-as-an-MCP-Server (spec-m18) ───────────────────────────────────────
memoryMcp:
  enabled: true

# ─── External memory adapters (optional; free) ────────────────────────────────
# Honcho adapter: gives black-box contained agents episodic memory via the
# governed MCP facade (spec-native-memory §Adapter). Requires an external Honcho
# (https://honcho.dev) reachable at baseUrl + a Secret holding its AUTH_JWT_SECRET.
# Off by default. Register it in the gateway's MCPServer registry per-tenant.
memory:
  honcho:
    enabled: false
    baseUrl: "http://honcho-api.honcho.svc.cluster.local:80"  # SERVICE port (often 80, not 8000)
    jwtSecret:
      name: honcho-secrets       # a Secret you provide (Honcho's AUTH_JWT_SECRET)
      key: AUTH_JWT_SECRET

# ─── Webhook receiver (Alertmanager/Slack/… → /api/v1/alerts) ─────────────────
webhookReceiver:
  enabled: true

# ─── LLM layer (REQUIRED to investigate) ──────────────────────────────────────
# Leloir gobierna agentes que usan un LLM. Traé tu proxy OpenAI-compatible (litellm,
# vLLM, Ollama con /v1, o la API de un proveedor) y Leloir enruta+gobierna las llamadas.
# El clientSecret/api-key NUNCA va acá — se inyecta por Secret (llm.apiKeySecret).
llm:
  enabled: true
  # driver: builtin (el más simple — apunta directo a un endpoint OpenAI-compatible),
  # litellm-operator, o envoy-ai-gw (avanzados, ver docs/proposal §m15). builtin p/empezar.
  driver: builtin
  spendPollInterval: 30s
  endpoint: ""                # e.g. "http://litellm.svc.cluster.local:4000" — tu proxy LLM
  apiKeySecret: ""            # Secret con key `api-key` (inyectado como env). "" = sin auth
  # Master key del litellm upstream (SÓLO drivers litellm-operator/envoy-ai-gw): Leloir la
  # usa para reconciliar teams/virtual-keys. Por Secret, nunca en values. "" = no se inyecta.
  masterKeySecret: ""         # e.g. litellm-master-key
  masterKeySecretKey: "master-key"
  # ── Sólo para driver: litellm-operator | envoy-ai-gw (avanzado) ──────────────
  # Reconciliación sobre un LiteLLMInstance (PalenaAI operator) ya desplegado.
  # Vacío para driver builtin. Ver examples/values-oidc.yaml para un ejemplo real.
  litellmOperator: {}
    # namespace: ai
    # instanceName: my-llm
    # endpoint: http://my-llm.ai.svc.cluster.local:4000
    # models: [claude-sonnet-5]
  # ── Sólo para driver: envoy-ai-gw ────────────────────────────────────────────
  # Cadena 2 capas por-tenant: Envoy AI Gateway (JWT keyless) → litellm.
  envoyAIGateway: {}
    # namespace: ai
    # gatewayName: my-ai-gw
    # endpoint: http://envoy-ai-<hash>.envoy-gateway-system.svc.cluster.local:80
    # upstreamHost: my-llm.ai.svc.cluster.local
    # upstreamPort: 4000
    # tokensPerHour: 200000
    # requireJWT: true
  # El modelo que se expone a los agentes. `upstream` = el nombre del modelo en tu endpoint.
  model:
    id: "default-model"
    upstream: "gpt-4o-mini"
    pricing: {inputPer1M: 0.15, outputPer1M: 0.60}   # para el metering/budget (ajustá al tuyo)
    maxTokensPerCall: 1024
  # Budget por-tenant por defecto (4-capas: la governance corta al excederlo).
  tenantBudget:
    monthlyMaxUSD: 50
    hardLimitAction: reject   # reject | notify-only

# Agente flagship first-party (leloir-agent). ON por default → el chart produce un
# control plane que YA puede investigar (razonamiento LLM). Las TOOLS reales (k8s, etc.)
# se agregan por CRD MCPServer / el gateway — ver docs. Para BYO-agent, registrá el tuyo
# con un AgentRegistration CRD (contrato AgentAdapter) y apagá este.
agents:
  flagship:
    enabled: true
    model: "default-model"    # debe existir en llm.model.id
  # Passthrough completo (avanzado/BYO): si `raw` tiene items, REEMPLAZA al flagship y
  # emite exactamente esta lista de agentes — con tools inline, múltiples agentes
  # (holmesgpt, etc.), toolsets custom. Es el schema real del CP. Ver examples/values-oidc.yaml.
  raw: []

# Ruta catch-all → flagship, para que toda alerta se investigue out-of-the-box.
routes:
  catchAll:
    enabled: true
    agentName: "leloir-agent"   # qué agente atiende la ruta (p.ej. holmesgpt)
    budgetMaxUSD: 0.50
    budgetMaxTokens: 0          # 0 = sin tope de tokens en la ruta
    timeoutMinutes: 10
  # Passthrough completo (avanzado): si `raw` tiene items, REEMPLAZA al catch-all.
  raw: []

# ─── Governance features (all free, on by default) ────────────────────────────
rag:                        # Episodic RAG (free)
  enabled: true
  embeddingModel: "local"   # local = zero deps; litellm alias = hosted (with key)
  embeddingDim: 256
  distanceThreshold: 0.25
  retentionDays: 90
anomaly:                    # anomaly → quarantine (free)
  spendVelocityUSD: 0.50
  autoReleaseCooldownMinutes: 30
  # Token del listener /internal/anomaly. Por defecto (profile local) el chart lo genera
  # (estable vía lookup). Bajo GitOps/ArgoCD el lookup no corre → referenciá un Secret
  # existente para que el token no cambie en cada sync; ahí el chart NO lo genera.
  thrashToken:
    existingSecret: ""       # e.g. leloir-thrash-token
    existingSecretKey: "token"

# ─── Kubernetes access (para las tools de incidentes) ─────────────────────────
# El CP lee pods/logs/events del cluster (vía el gateway + RBAC de rbac.create).
kubernetes:
  enabled: true

# ─── Observability (métricas Prometheus + OTLP traces opcionales) ─────────────
observability:
  metrics:
    enabled: true
    port: 9091
  # OTLP tracing (trazabilidad del modelo LLM real, spec-llm-traceability). Off por
  # defecto; seteá endpoint a tu colector (p.ej. Tempo/Alloy) para activarlo.
  otlp:
    enabled: false
    endpoint: ""            # e.g. http://alloy.observability.svc.cluster.local:4317
  environment: ""          # etiqueta de entorno en las métricas/trazas (p.ej. homelab, prod)
  # ServiceMonitor (Prometheus Operator) — scrapea el CP y el gateway. Requiere el CRD.
  serviceMonitor:
    enabled: false
    interval: 30s
    labels: {}             # labels extra para que tu Prometheus lo seleccione (p.ej. release: kube-prometheus-stack)
  # Dashboards de Grafana como ConfigMaps con el label grafana_dashboard (sidecar).
  dashboards:
    enabled: false
    label: grafana_dashboard   # label que tu sidecar de Grafana busca
    labelValue: "1"

# ─── SIEM audit streaming (free) ──────────────────────────────────────────────
# Forward every audit event (tool calls, approvals, budget, quarantine…) to an
# external HTTP sink — a SIEM or a collector (vector/fluent-bit) in front of
# one. FAIL-OPEN: a dead sink never blocks an investigation; the in-cluster
# Postgres audit stays the source of truth. Bearer auth via the
# LELOIR_AUDIT_STREAM_TOKEN env (set audit.streaming.existingSecret).
audit:
  hotRetentionDays: 7       # Postgres hot-tier retention (corporate profile default: 90)
  streaming:
    endpoint: ""            # empty = disabled
    headers: {}             # extra static headers (e.g. X-Scope-OrgID)
    batchSize: 64
    flushInterval: 2s
    existingSecret: ""      # Secret with key "token" → Authorization: Bearer
    existingSecretKey: "token"

# ─── Black-box containment (Modo 2, spec-m13.4 — free) ────────────────────────
# When enabled, platform-provisioned agents (AgentRegistration with
# spec.containment) get scoped RBAC + egress-lock + forced env pointing at the
# gateway/LLM seams. Requires an LLM proxy reachable at llmHost (e.g. litellm),
# which this chart does NOT bundle — hence off by default.
containment:
  enabled: false
  llmHost: ""               # e.g. litellm-proxy.ai.svc.cluster.local
  llmPort: 4000
  # Gateway seam para los agentes contenidos. Vacío = el gateway del chart; seteá
  # host/port si el gateway es externo (gateway.enabled=false + gateway.externalEndpoint).
  gatewayHost: ""           # e.g. leloir-mcp-gateway.leloir.svc.cluster.local
  gatewayPort: 8082
  extraPlatformNamespaces: []   # namespaces agents may egress to besides the release ns

# ─── Deployment hardening (chart flags, default OFF — requires Cilium) ────────
# These ARE separate manifests (Cilium CNPs) that would break a cluster without
# Cilium → off by default. Free like everything else; flip them ON when your
# cluster runs Cilium (mtls additionally needs SPIRE mutual-auth enabled).
hardening:
  mtls:
    enabled: false          # SPIFFE mTLS on gateway→control-plane :8090 (requires Cilium mutual-auth/SPIRE)
  networkPolicies:
    enabled: false          # Ingress-lock CNP on the internal listener (requires Cilium)

# ─── Exposure: Standard Ingress (default) or Gateway API HTTPRoute ────────────
ingress:
  enabled: true
  className: ""             # nginx | traefik | ""
  host: leloir.local
  tls: []
  annotations: {}
# Gateway API (homelab). If enabled, use this instead of the Ingress.
gateway_api:
  enabled: false
  parentRefName: ""
  parentRefNamespace: ""
  host: leloir.local

# ─── RBAC ─────────────────────────────────────────────────────────────────────
rbac:
  # cluster-wide watcher for Leloir (watches CRDs/pods in all ns); namespaced
  # Role for litellm. create:false if the operator manages them separately.
  create: true

# ─── Auth ─────────────────────────────────────────────────────────────────────
auth:
  # single-user (local) — a static admin without OIDC. For corporate, use OIDC.
  mode: single-user
  singleUser:
    username: admin
  oidc:
    enabled: false
    issuer: ""
    clientID: ""
    redirectURL: ""        # e.g. https://leloir.example.com/auth/callback ("" = default del CP)
    scopes:                # scopes OIDC pedidos al IdP
      - openid
      - email
      - profile
      - groups
    # clientSecret via existingSecret (never in values).
    existingSecret: ""
    existingSecretKey: "clientSecret"   # key dentro del Secret (ajustá si tu Secret usa otra, p.ej. client-secret)
    adminEmails: []         # emails granted the admin role
    # caSecret: Secret con la CA del issuer (PEM) a montar/confiar cuando el issuer
    # usa una CA privada (p.ej. Dex tras un gateway in-cluster con cluster-home-ca).
    # Vacío = solo el trust del sistema. Ver docs/OIDC_SETUP.md. Ej: cluster-home-ca.
    caSecret: ""
    caKey: "ca.crt"         # clave del Secret que contiene el PEM de la CA

# Node/scheduling (optional; empty = no restrictions).
nodeSelector: {}
tolerations: []
affinity: {}

# hostAliases: entradas /etc/hosts para el pod del control plane. Caso de uso: OIDC
# split-horizon — mapear el hostname del issuer (p.ej. dex.example.com) al ClusterIP
# del gateway cuando su VIP externo no es alcanzable in-cluster. Ver docs/OIDC_SETUP.md.
# Ej: [{ ip: "10.96.0.10", hostnames: ["dex.example.com"] }]
hostAliases: []
